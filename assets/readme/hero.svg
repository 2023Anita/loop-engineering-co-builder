<svg xmlns="http://www.w3.org/2000/svg"
     width="1200" height="400" viewBox="0 0 1200 400"
     role="img" aria-labelledby="title desc">
  <title id="title">Loop Engineering Co-Builder</title>
  <desc id="desc">A project-native map of a bounded agent loop: goal, observe, decide, act, verify, and persist, with routes to continue, repair, or stop.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6f8ea9"/>
    </marker>
    <filter id="paper-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#172127" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect width="1200" height="400" rx="28" fill="#fbf8f2"/>
  <path d="M 58 338 H 1142" stroke="#ded6c8" stroke-width="1"/>
  <path d="M 650 48 V 350" stroke="#ded6c8" stroke-width="1" stroke-dasharray="4 8"/>

  <g id="title-block" transform="translate(62 48)">
    <text x="0" y="0" dominant-baseline="hanging"
          fill="#8b7766" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
          font-size="14" font-weight="700" letter-spacing="2">CODEX SKILL / LOOP ENGINEERING</text>
    <text x="0" y="48" dominant-baseline="hanging"
          fill="#172127" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="44" font-weight="750">Loop Engineering</text>
    <text x="0" y="99" dominant-baseline="hanging"
          fill="#172127" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="44" font-weight="750">Co-Builder</text>
    <text x="0" y="165" dominant-baseline="hanging"
          fill="#52616a" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="18" font-weight="650">bounded · stateful · verifiable · recoverable</text>
    <text x="0" y="207" dominant-baseline="hanging"
          fill="#172127" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="17">Design loops that can prove progress, stop safely,</text>
    <text x="0" y="233" dominant-baseline="hanging"
          fill="#172127" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="17">and resume from files instead of chat history.</text>

    <g transform="translate(0 278)">
      <rect width="106" height="30" rx="15" fill="#e6eef4"/>
      <text x="53" y="20" text-anchor="middle" fill="#35566f"
            font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" font-weight="700">DESIGN</text>
      <rect x="118" width="112" height="30" rx="15" fill="#eef1e8"/>
      <text x="174" y="20" text-anchor="middle" fill="#566247"
            font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" font-weight="700">VERIFY</text>
      <rect x="242" width="126" height="30" rx="15" fill="#f2e8d7"/>
      <text x="305" y="20" text-anchor="middle" fill="#806646"
            font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" font-weight="700">HANDOFF</text>
    </g>
  </g>

  <g id="loop-map" transform="translate(686 54)">
    <rect x="0" y="0" width="454" height="292" rx="24" fill="#fffdf9" stroke="#ded6c8" stroke-width="1" filter="url(#paper-shadow)"/>
    <text x="28" y="32" fill="#8b7766" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" font-weight="700" letter-spacing="1.4">THE LOOP CONTRACT</text>

    <path d="M 96 94 C 158 48, 278 48, 358 96 C 410 128, 408 205, 352 235 C 270 278, 144 266, 82 218 C 44 188, 48 128, 96 94 Z"
          fill="none" stroke="#d8c19a" stroke-width="3" stroke-dasharray="9 8"/>
    <path d="M 102 94 C 164 54, 276 56, 349 98" fill="none" stroke="#6f8ea9" stroke-width="2.5" marker-end="url(#arrow)"/>
    <path d="M 357 104 C 398 138, 397 190, 357 224" fill="none" stroke="#6f8ea9" stroke-width="2.5" marker-end="url(#arrow)"/>
    <path d="M 345 234 C 270 270, 160 260, 94 218" fill="none" stroke="#a5b38c" stroke-width="2.5" marker-end="url(#arrow)"/>
    <path d="M 82 208 C 47 174, 54 126, 92 100" fill="none" stroke="#a5b38c" stroke-width="2.5" marker-end="url(#arrow)"/>

    <g id="nodes" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" font-weight="700">
      <g transform="translate(44 70)">
        <rect width="104" height="48" rx="14" fill="#e6eef4" stroke="#6f8ea9"/>
        <text x="52" y="29" text-anchor="middle" fill="#35566f">goal</text>
      </g>
      <g transform="translate(174 42)">
        <rect width="112" height="48" rx="14" fill="#e6eef4" stroke="#6f8ea9"/>
        <text x="56" y="29" text-anchor="middle" fill="#35566f">observe</text>
      </g>
      <g transform="translate(322 70)">
        <rect width="104" height="48" rx="14" fill="#e6eef4" stroke="#6f8ea9"/>
        <text x="52" y="29" text-anchor="middle" fill="#35566f">decide</text>
      </g>
      <g transform="translate(334 188)">
        <rect width="92" height="48" rx="14" fill="#eef1e8" stroke="#a5b38c"/>
        <text x="46" y="29" text-anchor="middle" fill="#566247">act</text>
      </g>
      <g transform="translate(190 226)">
        <rect width="112" height="48" rx="14" fill="#eef1e8" stroke="#a5b38c"/>
        <text x="56" y="29" text-anchor="middle" fill="#566247">verify</text>
      </g>
      <g transform="translate(44 178)">
        <rect width="112" height="48" rx="14" fill="#f2e8d7" stroke="#d8c19a"/>
        <text x="56" y="29" text-anchor="middle" fill="#806646">persist</text>
      </g>
    </g>

    <g transform="translate(166 124)">
      <rect width="142" height="58" rx="16" fill="#172127"/>
      <text x="71" y="23" text-anchor="middle" fill="#fbf8f2"
            font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" font-weight="700">.loop/&lt;slug&gt;/</text>
      <text x="71" y="42" text-anchor="middle" fill="#d8c19a"
            font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12">state + evidence</text>
    </g>

    <g transform="translate(104 300)">
      <circle cx="0" cy="0" r="5" fill="#6f8ea9"/>
      <text x="14" y="5" fill="#52616a" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13">continue</text>
      <circle cx="108" cy="0" r="5" fill="#a5b38c"/>
      <text x="122" y="5" fill="#52616a" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13">repair</text>
      <circle cx="190" cy="0" r="5" fill="#8b7766"/>
      <text x="204" y="5" fill="#52616a" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13">stop</text>
    </g>
  </g>
</svg>
